[pytest]
asyncio_mode = auto
# Use a session-scoped event loop for ALL tests and fixtures.
# This keeps the asyncpg connection pool (created when the first DB connection
# is made) alive and bound to a single event loop for the entire test session.
# Without this, each test function gets its own event loop, causing
# "Task got Future attached to a different loop" asyncpg errors.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

log_cli = false
